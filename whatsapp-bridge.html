<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Million Brand — تأكيد الحضور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --teal: #1A9090;
    --teal-light: #E8F5F5;
    --teal-border: #C2E0E0;
    --gold: #9A7B3A;
    --gold-light: #F0E8D6;
    --ivory: #FAFAF7;
    --white: #FFFFFF;
    --ink: #111111;
    --ink-secondary: #3A3A3A;
    --radius: 14px;
    --shadow: 0 8px 40px rgba(0,0,0,0.07);
    --shadow-btn: 0 4px 20px rgba(26,144,144,0.3);
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--ivory);
    font-family: 'Cairo', sans-serif;
    font-weight: 400;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 20px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 56px 48px 52px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    border: 1px solid rgba(0,0,0,0.04);
    position: relative;
    overflow: hidden;
  }

  /* corner accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--teal), #2BAFAF, var(--teal));
  }

  /* subtle corner shimmer */
  .card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 160px; height: 160px;
    background: radial-gradient(circle at top right, rgba(26,144,144,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── BADGE ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--teal-light);
    border: 1px solid var(--teal-border);
    border-radius: 100px;
    padding: 6px 18px;
    margin-bottom: 40px;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
  }

  .badge-text {
    font-size: 12px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    direction: ltr;
    unicode-bidi: embed;
  }

  /* ── ICON ── */
  .icon-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--teal-light);
    border: 1px solid var(--teal-border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
  }

  .icon-wrap svg {
    width: 32px;
    height: 32px;
    color: var(--teal);
  }

  /* ── HEADLINE ── */
  .headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 6vw, 34px);
    font-weight: 500;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 28px;
  }

  /* ── BODY TEXT ── */
  .body-text {
    font-size: 15px;
    font-weight: 400;
    color: var(--ink-secondary);
    line-height: 1.85;
    max-width: 360px;
    margin: 0 auto 40px;
  }

  .body-text strong {
    color: var(--ink);
    font-weight: 600;
  }

  /* ── WARNING BOX ── */
  .warning-box {
    background: #FFF8EE;
    border: 1px solid #E8D5A8;
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 36px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: right;
  }

  .warning-line {
    width: 3px;
    min-height: 40px;
    background: var(--gold);
    border-radius: 2px;
    flex-shrink: 0;
    order: 1;
  }

  .warning-text {
    font-size: 13px;
    font-weight: 500;
    color: #6B4F1A;
    line-height: 1.7;
    order: 0;
    flex: 1;
  }

  /* ── BUTTON ── */
  .btn {
    display: block;
    width: 100%;
    padding: 18px 32px;
    background: var(--teal);
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-decoration: none;
    border-radius: var(--radius);
    box-shadow: var(--shadow-btn);
    transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.15s ease;
    border: none;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .btn:hover {
    background: #157878;
    box-shadow: 0 6px 28px rgba(26,144,144,0.4);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  /* ── REMINDER ── */
  .reminder {
    font-size: 12px;
    font-weight: 500;
    color: #777770;
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  /* ── FOOTER BRAND ── */
  .footer-brand {
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid rgba(0,0,0,0.06);
    font-size: 11px;
    font-weight: 500;
    color: #AAAAAA;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    direction: ltr;
    unicode-bidi: embed;
  }

  /* ── MOBILE ── */
  @media (max-width: 520px) {
    .card {
      padding: 44px 28px 40px;
      border-radius: 20px;
    }
  }
</style>
</head>

<body>

<div class="card">

  <!-- BADGE -->
  <div class="badge">
    <span class="badge-dot"></span>
    <span class="badge-text">1 Million Brand</span>
  </div>

  <!-- ICON -->
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </div>

  <!-- HEADLINE -->
  <h1 class="headline">
    أنتِ على بُعد خطوة واحدة<br>من تأكيد حضورك
  </h1>

  <div class="divider"></div>

  <!-- BODY -->
  <p class="body-text">
    جميع تفاصيل الورشة التدريبية، الروابط، والتحديثات
    ستُشارَك <strong>داخل مجموعة واتساب الخاصة</strong> فقط.
  </p>

  <!-- WARNING -->
  <div class="warning-box">
    <p class="warning-text">
      في حال عدم انضمامك للمجموعة، لن تتمكني من الوصول إلى رابط الورشة يوم الحدث.
    </p>
    <div class="warning-line"></div>
  </div>

  <!-- CTA -->
  <a class="btn" href="https://chat.whatsapp.com/HUZEpqvi1nHI4WP7LIaA2F" target="_blank" rel="noopener noreferrer">
    انضمي الآن
  </a>

  <!-- FOOTER -->
  <p class="footer-brand">1 Million Brand &copy; 2025</p>

</div>

</body>
</html>
